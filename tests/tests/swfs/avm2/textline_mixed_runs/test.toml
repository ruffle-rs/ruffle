num_frames = 1

[fonts.sans]
family = "Liberation Sans"
path = "LiberationSans-Regular.ttf"
bold = false
italic = false

[fonts.serif]
family = "Liberation Serif"
path = "LiberationSerif-Regular.ttf"
bold = false
italic = false

[default_fonts]
sans = ["Liberation Sans"]
serif = ["Liberation Serif"]

[approximations]
number_patterns = ["=(-?[0-9]+\\.[0-9]+)"]
epsilon = 0.5

[image_comparisons.output]
tolerance = 12
max_outliers = 3500

[player_options]
with_renderer = { optional = false, quality = "high" }
