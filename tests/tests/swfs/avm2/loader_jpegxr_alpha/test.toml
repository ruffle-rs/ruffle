# gradient.jxr generated with ImageMagick:
# magick gradient.png -define jxr gradient.jxr
#
# TODO: This image does not have proper alpha handling
# in comparison to Flash Player (hence the large tolerance).
# It is possible for alpha to be the same across FP and Ruffle,
# but we need to figure out how to generate such an image,
# and modify this test with it.

num_frames = 3

[image_comparisons.output]
tolerance = 48
max_outliers = 1500

[player_options]
with_renderer = { optional = true, quality = "high" }

[required_features]
jpegxr = true
