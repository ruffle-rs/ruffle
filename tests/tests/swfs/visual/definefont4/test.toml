num_frames = 5

[image_comparisons.output]
tolerance = 1

# TextLines are now positioned by TLF using the real font metrics and rendered
# with a baseline origin like in Flash Player (previously: stub metrics and no
# baseline offset), which shifts the text slightly from the reference image.
known_failure = true

[player_options]
with_renderer = { optional = false, quality = "low" }
