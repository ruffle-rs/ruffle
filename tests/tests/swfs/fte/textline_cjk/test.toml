num_frames = 1

[fonts.cjk]
family = "Noto Sans CJK JP"
path = "NotoSansCJKjp-subset.otf"
bold = false
italic = false

[image_comparisons.output]
tolerance = 14
max_outliers = 12000

[player_options]
with_renderer = { optional = false, quality = "high" }

[approximations]
number_patterns = ["=(-?[0-9]+\\.[0-9]+)"]
epsilon = 0.5
