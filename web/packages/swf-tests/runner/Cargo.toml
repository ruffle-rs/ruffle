[package]
name = "web_test_runner"
authors = ["Nathan Adams <dinnerbone@dinnerbone.com>"]
edition.workspace = true
homepage.workspace = true
license.workspace = true
repository.workspace = true
version.workspace = true

[lints]
workspace = true

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
wasm-bindgen = { workspace = true }
js-sys = { workspace = true }
ruffle_test_framework = { path = "../../../../tests/framework" }
ruffle_render_wgpu = { path = "../../../../render/wgpu", features = ["webgl"] }
vfs = { workspace = true, features = ["embedded-fs"] }
rust-embed = { version = "8.7.2", features = ["include-exclude"] }
getrandom = { version = "0.3.3", features = ["wasm_js"] }
anyhow = { workspace = true }
chrono = { workspace = true, default-features = false, features = ["wasmbind", "clock"] }
tracing-subscriber = { workspace = true }
tracing = { workspace = true }
tracing-log = "0.2.0"
tracing-wasm = { workspace = true }
wasm-bindgen-futures = "0.4.50"
image = { workspace = true, default-features = false, features  = ["png"] }

[dependencies.web-sys]
workspace = true
features = ["Window"]
